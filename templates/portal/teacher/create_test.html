{% extends 'portal/base.html' %}
{% block title %}Create Test{% endblock %}
{% block page_title %}Create Class Test{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header py-3"><i class="bi bi-clipboard-plus me-2"></i>Create MCQ Test</div>
            <div class="card-body">
                <form method="post">{% csrf_token %}
                    {% for field in form %}<div class="mb-3"><label class="form-label fw-semibold">{{ field.label }}</label>{{ field }}</div>{% endfor %}
                    <button type="submit" class="btn btn-zpps px-4"><i class="bi bi-arrow-right me-2"></i>Next: Add Questions</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

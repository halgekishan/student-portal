{% extends 'portal/base.html' %}
{% block title %}Enter Marks{% endblock %}
{% block page_title %}Enter Marks{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card">
            <div class="card-header py-3"><i class="bi bi-pencil-fill me-2"></i>Enter Student Marks</div>
            <div class="card-body">
                <form method="post">{% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3"><label class="form-label fw-semibold">{{ field.label }}</label>{{ field }}
                    {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}</div>
                    {% endfor %}
                    <button type="submit" class="btn btn-zpps px-4"><i class="bi bi-save me-2"></i>Save Marks</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

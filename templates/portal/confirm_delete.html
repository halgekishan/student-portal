{% extends 'portal/base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block page_title %}Confirm Delete{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white py-3"><i class="bi bi-exclamation-triangle me-2"></i>Confirm Delete</div>
            <div class="card-body text-center p-4">
                <i class="bi bi-trash3-fill text-danger" style="font-size:3rem;"></i>
                <h5 class="mt-3">Delete {{ type }}?</h5>
                <p class="text-muted">Are you sure you want to delete <strong>{{ obj }}</strong>? This cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4 me-2"><i class="bi bi-trash me-2"></i>Yes, Delete</button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
